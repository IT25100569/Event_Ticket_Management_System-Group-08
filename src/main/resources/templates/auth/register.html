<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign Up | TixCore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-logo">TC</div>
            <h1>Create Account</h1>
            <p>Join TixCore and start booking tickets.</p>
        </div>
        <form th:action="@{/register}" method="post" class="auth-form">
            <div th:if="${error}" class="auth-error" th:text="${error}"></div>
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" th:value="${username}" required autofocus/>
            </div>
            <div class="field">
                <label>Full Name</label>
                <input type="text" name="fullName" th:value="${fullName}" required/>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" th:value="${email}" required/>
            </div>
            <div class="field">
                <label>Phone</label>
                <input type="text" name="phone" th:value="${phone}"/>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" required minlength="4"/>
            </div>
            <button type="submit" class="btn btn-block">Create Account</button>
            <div class="auth-foot">
                Already have an account? <a th:href="@{/login}">Sign in</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
